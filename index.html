<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VV INSIDER — The Game</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030305;
  --surface: rgba(255,255,255,0.04);
  --glass: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.1);
  --gold: #D4AF37;
  --gold-dim: rgba(212,175,55,0.15);
  --green: #34c759;
  --red: #ff3b30;
  --blue: #0A84FF;
  --text: #ffffff;
  --muted: rgba(255,255,255,0.35);
  --font: 'Space Grotesk', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
}

/* GRID BACKGROUND */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events:none; z-index:0;
}

/* GLOW */
body::after {
  content:'';
  position:fixed;
  top:-30%; left:50%; transform:translateX(-50%);
  width:800px; height:800px;
  background: radial-gradient(circle, rgba(212,175,55,0.04) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ===== SCREENS ===== */
.screen {
  position: fixed; inset:0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  padding: 24px;
}
.screen.active { display: flex; }

/* ===== LOBBY ===== */
#screen-lobby {
  gap: 0;
}

.vv-logo-game {
  font-size: clamp(80px, 15vw, 140px);
  font-weight: 700;
  letter-spacing: -8px;
  line-height: 1;
  color: #fff;
  margin-bottom: 8px;
  animation: logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat {
  0%,100% { text-shadow: 0 0 40px rgba(255,255,255,0.1); transform: translateY(0); }
  50% { text-shadow: 0 0 80px rgba(255,255,255,0.2), 0 0 160px rgba(212,175,55,0.08); transform: translateY(-6px); }
}

.game-subtitle {
  font-size: 11px;
  letter-spacing: 6px;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 60px;
  opacity: 0.8;
}

.lobby-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 480px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.lobby-title {
  font-size: 13px;
  letter-spacing: 3px;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 24px;
  text-align: center;
}

.input-field {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  color: #fff;
  font-size: 15px;
  font-family: var(--font);
  outline: none;
  margin-bottom: 12px;
  transition: border-color 0.2s;
  letter-spacing: 1px;
}

.input-field:focus { border-color: rgba(255,255,255,0.3); }
.input-field::placeholder { color: var(--muted); font-size: 13px; letter-spacing: 2px; }

.btn-game {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  border: none;
  font-family: var(--font);
}

.btn-primary {
  background: rgba(255,255,255,0.92);
  color: #000;
}
.btn-primary:hover { background: #fff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }

.btn-secondary {
  background: var(--glass);
  color: var(--muted);
  border: 1px solid var(--border);
  margin-top: 10px;
}
.btn-secondary:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

.or-divider {
  text-align:center;
  color: var(--muted);
  font-size: 12px;
  letter-spacing: 2px;
  margin: 16px 0;
}

/* ===== WAITING ROOM ===== */
#screen-waiting {
  gap: 24px;
}

.room-code-display {
  background: var(--gold-dim);
  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 20px;
  padding: 24px 40px;
  text-align: center;
}

.room-code-label {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--gold);
  margin-bottom: 8px;
}

.room-code-value {
  font-family: var(--mono);
  font-size: 48px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 8px;
}

.players-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 12px;
  width: 100%;
  max-width: 600px;
}

.player-slot {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 16px;
  text-align: center;
  transition: all 0.3s;
}

.player-slot.filled {
  background: rgba(52,199,89,0.06);
  border-color: rgba(52,199,89,0.25);
}

.player-slot.me {
  background: var(--gold-dim);
  border-color: rgba(212,175,55,0.3);
}

.player-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--glass);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin: 0 auto 10px;
}

.player-slot.filled .player-avatar { background: rgba(52,199,89,0.1); border-color: rgba(52,199,89,0.3); }
.player-slot.me .player-avatar { background: var(--gold-dim); border-color: rgba(212,175,55,0.4); }

.player-name {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-status {
  font-size: 10px;
  color: var(--muted);
  margin-top: 3px;
  letter-spacing: 1px;
}

.waiting-info {
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

/* ===== GAME SCREEN ===== */
#screen-game {
  justify-content: flex-start;
  padding: 0;
  overflow: hidden;
}

.game-hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(3,3,5,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}

.hud-timer {
  font-family: var(--mono);
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  min-width: 80px;
  text-align: center;
}

.hud-timer.urgent { color: var(--red); animation: timerPulse 0.5s infinite; }
@keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.hud-balance {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--gold-dim);
  border: 1px solid rgba(212,175,55,0.25);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--gold);
}

.hud-round {
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--muted);
  text-align: right;
}

.hud-round strong { color: #fff; display: block; font-size: 16px; letter-spacing: 0;  }

/* GAME CONTENT */
.game-content {
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  padding: 100px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* MISSION CARD */
.mission-display {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px;
  position: relative;
  overflow: hidden;
}

.mission-display::before {
  content:'';
  position:absolute; top:-1px; left:10%; right:10%;
  height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

.mission-label {
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold);
  font-weight: 700;
  margin-bottom: 12px;
}

.mission-text {
  font-size: clamp(18px, 3vw, 26px);
  font-weight: 700;
  color: #fff;
  line-height: 1.3;
  margin-bottom: 16px;
}

.mission-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}

.mission-tag {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  color: var(--muted);
}

/* ACTIONS GRID */
.actions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.action-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
  position: relative;
  overflow: hidden;
}

.action-card::after {
  content:'';
  position:absolute; inset:0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
}

.action-card:hover {
  border-color: rgba(255,255,255,0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

.action-card:hover::after { background: rgba(255,255,255,0.02); }

.action-card.selected {
  border-color: var(--green);
  background: rgba(52,199,89,0.06);
}

.action-card.wrong {
  border-color: var(--red);
  background: rgba(255,59,48,0.06);
  animation: shake 0.4s ease;
}

.action-card.correct {
  border-color: var(--gold);
  background: var(--gold-dim);
  animation: correctFlash 0.5s ease;
}

@keyframes shake {
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-6px)}
  40%,80%{transform:translateX(6px)}
}

@keyframes correctFlash {
  0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)}
}

.action-emoji { font-size: 28px; margin-bottom: 10px; }
.action-title { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.action-desc { font-size: 12px; color: var(--muted); line-height: 1.4; }
.action-reward {
  position: absolute;
  top: 12px; right: 12px;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
}

/* LEADERBOARD SIDEBAR */
.game-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 20px;
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  padding: 100px 24px 24px;
}

@media(max-width: 768px) {
  .game-layout { grid-template-columns: 1fr; }
  .live-leaderboard { display: none; }
}

.live-leaderboard {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  height: fit-content;
  position: sticky;
  top: 80px;
}

.lb-title {
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}

.lb-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 6px;
  transition: all 0.3s;
}

.lb-row.top { background: var(--gold-dim); border: 1px solid rgba(212,175,55,0.2); }
.lb-row.me { background: rgba(52,199,89,0.06); border: 1px solid rgba(52,199,89,0.2); }

.lb-rank {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  width: 24px;
  text-align: center;
}

.lb-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lb-score {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
}

/* RESULT OVERLAY */
.result-overlay {
  position: fixed; inset:0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
  flex-direction: column;
  gap: 24px;
}

.result-overlay.show { display: flex; }

.result-card {
  background: rgba(14,14,18,0.98);
  border: 1px solid var(--border);
  border-radius: 28px;
  padding: 48px;
  text-align: center;
  max-width: 480px;
  width: 90%;
  animation: resultSlide 0.5s cubic-bezier(0.16,1,0.3,1);
}

@keyframes resultSlide {
  from { opacity:0; transform:scale(0.9) translateY(20px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}

.result-emoji { font-size: 72px; margin-bottom: 16px; display: block; }
.result-title { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.result-sub { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

.final-scores {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 32px;
}

.final-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 12px;
}

.final-row.winner {
  background: var(--gold-dim);
  border-color: rgba(212,175,55,0.3);
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 30px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 30px;
  padding: 12px 24px;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  opacity: 0;
  transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
  z-index: 9999;
  white-space: nowrap;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* PROGRESS BAR */
.mission-progress {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 20px;
}

.mission-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), #fff3a0);
  border-radius: 3px;
  transition: width 1s linear;
  box-shadow: 0 0 8px rgba(212,175,55,0.4);
}

/* COINS POPUP */
.coins-popup {
  position: fixed;
  pointer-events: none;
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--gold);
  z-index: 9999;
  animation: coinsFloat 1.2s ease forwards;
  text-shadow: 0 0 20px rgba(212,175,55,0.5);
}

@keyframes coinsFloat {
  0% { opacity:1; transform: translateY(0) scale(1); }
  100% { opacity:0; transform: translateY(-80px) scale(1.3); }
}

/* COPY BUTTON */
.copy-code-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font);
  margin-top: 4px;
  transition: color 0.2s;
  letter-spacing: 1px;
}
.copy-code-btn:hover { color: #fff; }

/* PULSE DOT */
.pulse-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--green);
  animation: pulseDot 2s infinite;
  display: inline-block;
}

@keyframes pulseDot {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.4;transform:scale(0.7)}
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="screen-lobby" class="screen active">
  <div class="vv-logo-game">VV</div>
  <div class="game-subtitle">INSIDER — THE GAME</div>

  <div class="lobby-card">
    <div class="lobby-title">INTRĂ ÎN REȚEA</div>
    <input id="input-alias" class="input-field" placeholder="ALIAS INSIDER" maxlength="16" autocomplete="off">
    <button class="btn-game btn-primary" onclick="createRoom()">CREAZĂ CAMERĂ NOUĂ</button>
    <div class="or-divider">— SAU —</div>
    <input id="input-code" class="input-field" placeholder="COD CAMERĂ" maxlength="4" style="letter-spacing:6px; text-align:center; text-transform:uppercase;" autocomplete="off">
    <button class="btn-game btn-secondary" onclick="joinRoom()">ALĂTURĂ-TE</button>
  </div>
</div>

<!-- WAITING ROOM -->
<div id="screen-waiting" class="screen">
  <div class="room-code-display">
    <div class="room-code-label">COD CAMERĂ</div>
    <div class="room-code-value" id="display-room-code">----</div>
    <button class="copy-code-btn" onclick="copyRoomCode()">📋 COPIAZĂ CODUL</button>
  </div>

  <div class="players-grid" id="players-grid"></div>

  <div class="waiting-info" id="waiting-info">
    <span class="pulse-dot"></span>
    &nbsp; Se așteaptă Insideri... (<span id="player-count">1</span>/4)
  </div>

  <button class="btn-game btn-primary" id="btn-start" style="max-width:320px; display:none;" onclick="startGame()">
    LANSEAZĂ MISIUNILE ▶
  </button>

  <button class="btn-game btn-secondary" style="max-width:320px;" onclick="backToLobby()">
    IEȘI DIN CAMERĂ
  </button>
</div>

<!-- GAME -->
<div id="screen-game" class="screen">
  <div class="game-hud">
    <div>
      <div style="font-size:10px; letter-spacing:3px; color:var(--muted);">TIMP</div>
      <div class="hud-timer" id="hud-timer">30</div>
    </div>
    <div class="hud-balance">
      <span>⚡</span>
      <span id="hud-balance">0</span>
      <span style="font-size:13px; opacity:0.5;">VV</span>
    </div>
    <div class="hud-round">
      <span>RUNDA</span>
      <strong id="hud-round">1/5</strong>
    </div>
  </div>

  <div class="game-layout">
    <!-- MAIN -->
    <div>
      <div class="mission-progress">
        <div class="mission-progress-bar" id="progress-bar" style="width:100%"></div>
      </div>

      <div class="mission-display">
        <div class="mission-label">CONTRACT ACTIV</div>
        <div class="mission-text" id="mission-text">Se încarcă misiunea...</div>
        <div class="mission-meta" id="mission-meta"></div>
      </div>

      <div style="font-size:11px; letter-spacing:3px; color:var(--muted); margin:16px 0 12px;">ALEGE ACȚIUNEA CORECTĂ</div>

      <div class="actions-grid" id="actions-grid"></div>
    </div>

    <!-- LEADERBOARD -->
    <div class="live-leaderboard">
      <div class="lb-title">LIVE RANKING</div>
      <div id="lb-list"></div>
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="result-overlay" id="result-overlay">
  <div class="result-card" id="result-card">
    <span class="result-emoji" id="result-emoji">🏆</span>
    <div class="result-title" id="result-title">MECI TERMINAT</div>
    <div class="result-sub" id="result-sub">Rezultatele finale</div>
    <div class="final-scores" id="final-scores"></div>
    <button class="btn-game btn-primary" onclick="restartGame()">JOACĂ DIN NOU</button>
    <button class="btn-game btn-secondary" style="margin-top:10px;" onclick="backToLobby()">IEȘI</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ===== GAME STATE =====
const MISSIONS = [
  {
    text: "E coadă la clubul X? Un Insider trimite dovada în 30 de secunde.",
    location: "Club X — Centru",
    reward: 25,
    correct: 1,
    options: [
      { emoji: "📸", title: "Fotografiez intrarea", desc: "Fac poza cu VV PROOF și o trimit imediat", reward: "+25 VV" },
      { emoji: "💬", title: "Întreb pe cineva", desc: "Cer informații de la un trecător", reward: "+5 VV" },
      { emoji: "🏠", title: "Stau acasă", desc: "Nu mă deplasez la locație", reward: "-10 VV" },
      { emoji: "🎭", title: "Trimit o poză veche", desc: "Folosesc o poză din galerie", reward: "-25 VV" }
    ]
  },
  {
    text: "Cât de aglomerat e metroul acum? Contract de 15 VV activ!",
    location: "Stație Metro — Piața Victoriei",
    reward: 15,
    correct: 0,
    options: [
      { emoji: "🚇", title: "Merg la stație", desc: "Verific personal și trimit VV PROOF live", reward: "+15 VV" },
      { emoji: "🌐", title: "Caut pe Google", desc: "Găsesc informații din surse online", reward: "-5 VV" },
      { emoji: "📞", title: "Sun un prieten", desc: "Îl întreb dacă știe cumva", reward: "+2 VV" },
      { emoji: "❌", title: "Refuz misiunea", desc: "Nu accept contractul", reward: "0 VV" }
    ]
  },
  {

let state = {
  myAlias: '',
  roomCode: '',
  isHost: false,
  players: [],
  myScore: 0,
  round: 0,
  totalRounds: 5,
  timer: 30,
  timerInterval: null,
  progressInterval: null,
  currentMission: null,
  answered: false,
  gameStarted: false
};

// ===== UTILS =====
function genCode() {
  return Math.random().toString(36).substring(2,6).toUpperCase();
}

function showToast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function spawnCoins(amount, x, y) {
  const el = document.createElement('div');
  el.className = 'coins-popup';
  el.textContent = (amount > 0 ? '+' : '') + amount + ' VV';
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = amount > 0 ? 'var(--gold)' : 'var(--red)';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ===== SIMULATED PLAYERS =====
const BOT_NAMES = ['ALEX_', 'RARES_', 'ANDREEA_', 'MIHAI_', 'ELENA_', 'DAN_'];
const BOT_EMOJIS = ['🦊', '🐺', '🦅', '🐉', '🦁', '⚡'];

function generateBots(count) {
  const bots = [];
  for(let i = 0; i < count; i++) {
    bots.push({
      id: 'bot_' + i,
      alias: BOT_NAMES[i % BOT_NAMES.length] + Math.floor(Math.random()*99),
      emoji: BOT_EMOJIS[i % BOT_EMOJIS.length],
      score: 0,
      isBot: true
    });
  }
  return bots;
}

// ===== LOBBY =====
function createRoom() {
  const alias = document.getElementById('input-alias').value.trim().toUpperCase();
  if (!alias || alias.length < 2) { showToast('⚠️ Introdu un alias de minim 2 caractere!'); return; }

  state.myAlias = alias;
  state.roomCode = genCode();
  state.isHost = true;

  const me = { id: 'me', alias: alias, emoji: '👤', score: 0, isBot: false };
  state.players = [me, ...generateBots(3)];

  showWaitingRoom();
}

function joinRoom() {
  const alias = document.getElementById('input-alias').value.trim().toUpperCase();
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  if (!alias || alias.length < 2) { showToast('⚠️ Introdu un alias!'); return; }
  if (!code || code.length !== 4) { showToast('⚠️ Introdu un cod de 4 caractere!'); return; }

  state.myAlias = alias;
  state.roomCode = code;
  state.isHost = false;

  const me = { id: 'me', alias: alias, emoji: '👤', score: 0, isBot: false };
  state.players = [me, ...generateBots(3)];

  showToast('🔗 Conectat la camera ' + code + '!');
  showWaitingRoom();
}

function showWaitingRoom() {
  document.getElementById('display-room-code').textContent = state.roomCode;
  renderPlayersGrid();

  // Simulate players joining
  setTimeout(() => {
    document.getElementById('player-count').textContent = state.players.length;
    if (state.players.length >= 2 && state.isHost) {
      document.getElementById('btn-start').style.display = 'block';
    }
    renderPlayersGrid();
  }, 1000);

  showScreen('waiting');
}

function renderPlayersGrid() {
  const grid = document.getElementById('players-grid');
  grid.innerHTML = '';

  state.players.forEach((p, i) => {
    const slot = document.createElement('div');
    slot.className = 'player-slot ' + (p.isBot ? 'filled' : 'me');
    slot.innerHTML = `
      <div class="player-avatar">${p.emoji}</div>
      <div class="player-name">${p.alias}</div>
      <div class="player-status">${p.isBot ? 'INSIDER' : 'TU · HOST'}</div>
    `;
    grid.appendChild(slot);
  });
}

function copyRoomCode() {
  navigator.clipboard.writeText(state.roomCode).then(() => {
    showToast('📋 Cod copiat: ' + state.roomCode);
  }).catch(() => showToast('Cod: ' + state.roomCode));
}

// ===== GAME =====
function startGame() {
  state.round = 0;
  state.myScore = 0;
  state.players.forEach(p => p.score = 0);
  showScreen('game');
  nextRound();
}

function nextRound() {
  if (state.round >= state.totalRounds) {
    endGame();
    return;
  }

  state.answered = false;
  state.round++;

  // Pick random mission
  const mIdx = Math.floor(Math.random() * MISSIONS.length);
  state.currentMission = MISSIONS[mIdx];

  renderMission();
  startTimer();
  updateHUD();
  updateLeaderboard();
}

function renderMission() {
  const m = state.currentMission;

  document.getElementById('mission-text').textContent = m.text;
  document.getElementById('mission-meta').innerHTML = `
    <div class="mission-tag">📍 ${m.location}</div>
    <div class="mission-tag">💰 ${m.reward} VV</div>
    <div class="mission-tag">⚡ LIVE</div>
  `;

  const grid = document.getElementById('actions-grid');
  grid.innerHTML = '';

  m.options.forEach((opt, i) => {
    const card = document.createElement('div');
    card.className = 'action-card';
    card.id = 'action-' + i;
    card.onclick = () => selectAction(i, card);
    card.innerHTML = `
      <div class="action-reward">${opt.reward}</div>
      <div class="action-emoji">${opt.emoji}</div>
      <div class="action-title">${opt.title}</div>
      <div class="action-desc">${opt.desc}</div>
    `;
    grid.appendChild(card);
  });
}

function startTimer() {
  clearInterval(state.timerInterval);
  clearInterval(state.progressInterval);

  state.timer = 30;
  const timerEl = document.getElementById('hud-timer');
  const progressBar = document.getElementById('progress-bar');
  timerEl.classList.remove('urgent');
  progressBar.style.transition = 'width 1s linear';
  progressBar.style.width = '100%';

  // Bots answer after random delay
  const botDelay = (5 + Math.random() * 15) * 1000;
  setTimeout(() => botsAnswer(), botDelay);

  state.timerInterval = setInterval(() => {
    state.timer--;
    timerEl.textContent = state.timer;
    progressBar.style.width = (state.timer / 30 * 100) + '%';

    if (state.timer <= 10) timerEl.classList.add('urgent');

    if (state.timer <= 0) {
      clearInterval(state.timerInterval);
      if (!state.answered) {
        showToast('⏰ Timp expirat! -5 VV');
        state.myScore -= 5;
        state.players.find(p => !p.isBot).score -= 5;
      }
      setTimeout(() => nextRound(), 1500);
    }
  }, 1000);
}

function selectAction(index, cardEl) {
  if (state.answered) return;
  state.answered = true;
  clearInterval(state.timerInterval);

  const m = state.currentMission;
  const isCorrect = index === m.correct;

  // Parse reward
  const rewardText = m.options[index].reward;
  let rewardVal = 0;
  const match = rewardText.match(/([+-]?\d+)/);
  if (match) rewardVal = parseInt(match[1]);

  // Visual feedback
  document.querySelectorAll('.action-card').forEach((c, i) => {
    if (i === m.correct) c.classList.add('correct');
    if (i === index && !isCorrect) c.classList.add('wrong');
  });

  // Score
  state.myScore += rewardVal;
  state.players.find(p => !p.isBot).score = state.myScore;

  // Coins popup
  const rect = cardEl.getBoundingClientRect();
  spawnCoins(rewardVal, rect.left + rect.width/2, rect.top);

  if (isCorrect) {
    showToast('✅ Corect! ' + (rewardVal > 0 ? '+' : '') + rewardVal + ' VV');
  } else {
    showToast('❌ Greșit! ' + rewardVal + ' VV · Corect era: ' + m.options[m.correct].title);
  }

  updateHUD();
  updateLeaderboard();
  setTimeout(() => nextRound(), 2000);
}

function botsAnswer() {
  if (!state.answered) return;
  // Bots get random scores
  state.players.forEach(p => {
    if (p.isBot) {
      const botScore = Math.floor(Math.random() * 25) + 5;
      p.score += botScore;
    }
  });
  updateLeaderboard();
}

function updateHUD() {
  document.getElementById('hud-balance').textContent = state.myScore;
  document.getElementById('hud-round').textContent = state.round + '/' + state.totalRounds;
}

function updateLeaderboard() {
  const sorted = [...state.players].sort((a,b) => b.score - a.score);
  const lb = document.getElementById('lb-list');
  lb.innerHTML = '';

  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    const isFirst = i === 0;
    const isMe = !p.isBot;
    row.className = 'lb-row' + (isFirst ? ' top' : isMe ? ' me' : '');
    row.innerHTML = `
      <div class="lb-rank">${i === 0 ? '👑' : '#' + (i+1)}</div>
      <div class="lb-name">${p.emoji} ${p.alias}</div>
      <div class="lb-score">${p.score}</div>
    `;
    lb.appendChild(row);
  });
}

function endGame() {
  clearInterval(state.timerInterval);

  const sorted = [...state.players].sort((a,b) => b.score - a.score);
  const winner = sorted[0];
  const myRank = sorted.findIndex(p => !p.isBot) + 1;
  const isWinner = myRank === 1;

  document.getElementById('result-emoji').textContent = isWinner ? '🏆' : myRank === 2 ? '🥈' : '🎯';
  document.getElementById('result-title').textContent = isWinner ? 'AI CÂȘTIGAT!' : 'LOC ' + myRank;
  document.getElementById('result-sub').textContent = isWinner
    ? 'Ești cel mai bun Insider din rețea!'
    : state.myAlias + ' · ' + state.myScore + ' VV Coins acumulați';

  const scoresEl = document.getElementById('final-scores');
  scoresEl.innerHTML = '';
  sorted.forEach((p, i) => {
    const row = document.createElement('div');
    row.className = 'final-row' + (i === 0 ? ' winner' : '');
    row.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="font-size:18px;">${i===0?'🏆':i===1?'🥈':'🥉'}</span>
        <span style="font-weight:700;">${p.alias}</span>
        ${!p.isBot ? '<span style="font-size:10px;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:6px;">TU</span>' : ''}
      </div>
      <span style="font-family:var(--mono);color:var(--gold);font-weight:700;">${p.score} VV</span>
    `;
    scoresEl.appendChild(row);
  });

  document.getElementById('result-overlay').classList.add('show');
}

function restartGame() {
  document.getElementById('result-overlay').classList.remove('show');
  state.round = 0;
  state.myScore = 0;
  state.players.forEach(p => p.score = 0);
  startGame();
}

function backToLobby() {
  clearInterval(state.timerInterval);
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('input-alias').value = state.myAlias || '';
  document.getElementById('input-code').value = '';
  showScreen('lobby');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// Enter key support
document.getElementById('input-code').addEventListener('keypress', e => {
  if (e.key === 'Enter') joinRoom();
  e.target.value = e.target.value.toUpperCase();
});
document.getElementById('input-alias').addEventListener('keypress', e => {
  if (e.key === 'Enter') createRoom();
  e.target.value = e.target.value.toUpperCase();
});
</script>
